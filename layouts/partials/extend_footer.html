<!-- Reading Progress -->
<div id="reading-progress"></div>

<!-- Sticky Footer Ad -->
<div class="as-sticky-footer" id="asStickyFooter">
  <button class="as-sf-close" id="asSfClose" aria-label="Close">✕</button>
  <a href="https://androidscroll.com/offer/anker-chargers/" class="as-sf-inner" target="_blank" rel="noopener sponsored">
    <div class="as-sf-img">
      <img src="https://androidscroll.com/wp-content/uploads/2026/03/Anker-Logo.jpeg" alt="Anker Charger" loading="lazy">
    </div>
    <div class="as-sf-body">
      <span class="as-sf-label">Sponsored</span>
      <p class="as-sf-headline">Super Fast Charging</p>
      <span class="as-sf-sub">Anker GaN Charger</span>
    </div>
    <div class="as-sf-cta">Shop Now</div>
  </a>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  // Reading progress
  const bar = document.getElementById("reading-progress");
  if (bar) {
    window.addEventListener("scroll", function () {
      const d = document.documentElement;
      bar.style.width = Math.min((d.scrollTop / (d.scrollHeight - d.clientHeight)) * 100, 100) + "%";
    });
  }

  // Sticky header
  const header = document.querySelector("header");
  if (header) {
    let last = 0;
    window.addEventListener("scroll", function () {
      const cur = window.scrollY;
      if (cur <= 0) { header.style.transform = "translateY(0)"; return; }
      header.style.transform = cur > last ? "translateY(-100%)" : "translateY(0)";
      header.style.transition = "transform 0.3s ease";
      last = cur;
    });
  }

  // Sticky footer ad
  const sf = document.getElementById("asStickyFooter");
  const sfClose = document.getElementById("asSfClose");
  if (sf) {
    if (sessionStorage.getItem("as_sf_closed")) {
      sf.style.display = "none";
    } else {
      setTimeout(function () { sf.classList.add("as-sf--show"); }, 5000);
    }
    sfClose && sfClose.addEventListener("click", function () {
      sf.classList.remove("as-sf--show");
      setTimeout(function () { sf.style.display = "none"; }, 350);
      sessionStorage.setItem("as_sf_closed", "1");
    });
  }

  // TOC fix — assign IDs to headings then rewrite TOC links to match
  const content = document.querySelector(".post-content");
  const toc = document.querySelector(".toc");
  if (!content || !toc) return;

  // Step 1: collect all headings and assign IDs
  const headings = Array.from(content.querySelectorAll("h2, h3"));
  headings.forEach(function (h, i) {
    const slug = "heading-" + i;
    h.id = slug;
  });

  // Step 2: rewrite TOC links to match heading order
  const tocLinks = Array.from(toc.querySelectorAll("a"));
  tocLinks.forEach(function (link, i) {
    if (headings[i]) {
      link.href = "#heading-" + i;
      link.addEventListener("click", function (e) {
        e.preventDefault();
        const target = document.getElementById("heading-" + i);
        if (target) window.scrollTo({ top: target.getBoundingClientRect().top + window.scrollY - 80, behavior: "smooth" });
      });
    }
  });

});
</script>
