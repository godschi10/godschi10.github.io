colorScheme = "custom"
defaultAppearance = "dark"
autoSwitchAppearance = true
enableSearch = true
enableCodeCopy = true
mainSections = ["posts"]

[author]
  name = "AndroidScroll"
  headline = "Android tips, tricks and guides"

[homepage]
  layout = "hero"
  showRecent = true
  recentLimit = 10

[article]
  showDate = true
  showReadingTime = true
  showTableOfContents = true
  showBreadcrumbs = true
  showRelatedContent = true
  relatedContentLimit = 3
  showTaxonomies = true
  sharingLinks = ["twitter","whatsapp","telegram"]

[list]
  showCards = true
  showSummary = true
  groupByYear = false

[footer]
  showScrollToTop = true
